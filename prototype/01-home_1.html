<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyaya Saral — Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,450;9..144,560;9..144,650&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D0D0D;
  --bg-elevated:#161211;
  --bg-elevated-2:#1C1716;
  --maroon:#7A1F2B;
  --maroon-deep:#5A161F;
  --maroon-bright:#9C2B3A;
  --gold:#B8860B;
  --gold-bright:#D4A017;
  --ivory:#F5F0E8;
  --ivory-dim:#C9C0B4;
  --muted:#8F857C;
  --line:#2A2422;
  --paper:#EFE7D8;
  --paper-ink:#2A2422;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ivory);
  font-family:'IBM Plex Sans', sans-serif;
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
::selection{ background:var(--maroon); color:var(--ivory); }
a{ color:inherit; text-decoration:none; }
.wrap{ max-width:1080px; margin:0 auto; padding:0 28px; width:100%; }
h1,h2,h3{ font-family:'Fraunces', serif; font-weight:560; letter-spacing:-0.01em; color:var(--ivory); }
.eyebrow{
  font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--gold-bright); display:flex; align-items:center; gap:10px;
}
.eyebrow::before{ content:""; width:14px; height:1px; background:var(--gold-bright); }

/* header shared across app screens */
header.appbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 28px; border-bottom:1px solid var(--line);
  position:sticky; top:0; background:rgba(13,13,13,0.9); backdrop-filter:blur(10px); z-index:20;
}
.logo{ display:flex; align-items:center; gap:10px; font-family:'Fraunces', serif; font-size:18px; font-weight:560; }
.seal{
  width:28px; height:28px; border-radius:50%; border:1.4px solid var(--gold);
  display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0;
}
.seal::before{ content:""; position:absolute; inset:4px; border-radius:50%; border:1px dashed var(--maroon-bright); opacity:0.7; }
.seal-mark{ width:6px; height:6px; background:var(--gold); border-radius:50%; }
.seal.lg{ width:52px; height:52px; }
.seal.lg::before{ inset:6px; }
.seal.lg .seal-mark{ width:9px; height:9px; }

.lang-switch{ display:flex; border:1px solid var(--line); border-radius:20px; overflow:hidden; font-family:'IBM Plex Mono', monospace; font-size:12.5px; }
.lang-switch button{ background:none; border:none; color:var(--muted); padding:7px 13px; cursor:pointer; font-family:inherit; font-size:inherit; transition:all .15s ease; }
.lang-switch button.active{ background:var(--maroon); color:var(--ivory); }

.btn{ display:inline-flex; align-items:center; gap:8px; font-family:'IBM Plex Sans', sans-serif; font-weight:500; font-size:14px; padding:10px 18px; border-radius:3px; border:1px solid transparent; cursor:pointer; transition:all .18s ease; white-space:nowrap; }
.btn-primary{ background:var(--maroon); color:var(--ivory); border-color:var(--maroon-bright); }
.btn-primary:hover{ background:var(--maroon-bright); }
.btn-ghost{ color:var(--ivory-dim); border-color:var(--line); }
.btn-ghost:hover{ border-color:var(--gold); color:var(--gold-bright); }
.btn-gold{ background:rgba(184,134,11,0.14); color:var(--gold-bright); border-color:rgba(184,134,11,0.45); }
.btn-gold:hover{ background:rgba(184,134,11,0.22); }
.btn svg{ width:15px; height:15px; }

.badge{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; padding:4px 10px; border-radius:20px; letter-spacing:0.02em; display:inline-block; }
.badge-gold{ background:rgba(184,134,11,0.14); color:var(--gold-bright); border:1px solid rgba(184,134,11,0.4); }
.badge-maroon{ background:rgba(122,31,43,0.18); color:#E08B96; border:1px solid rgba(156,43,58,0.5); }
.badge-muted{ background:rgba(255,255,255,0.03); color:var(--muted); border:1px solid var(--line); }

.chip{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; padding:8px 15px; border-radius:20px; border:1px solid var(--maroon-bright); color:var(--ivory); background:rgba(122,31,43,0.1); }
.chip.soon{ border-color:var(--line); color:var(--muted); background:transparent; }

.card{ background:var(--bg-elevated); border:1px solid var(--line); border-radius:4px; }

footer.appfoot{ text-align:center; padding:20px 24px 26px; font-size:12px; color:var(--muted); margin-top:auto; }
footer.appfoot a{ color:var(--ivory-dim); border-bottom:1px solid var(--line); }
footer.appfoot a:hover{ color:var(--gold-bright); border-color:var(--gold-bright); }
footer.appfoot .disclaimer{ margin-top:6px; opacity:0.75; }

main{ flex:1; }


main.home{ display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px 24px 40px; }
h1.hero-h{ font-size:32px; line-height:1.25; max-width:480px; margin-bottom:10px; }
.sub{ color:var(--ivory-dim); font-size:15px; max-width:380px; margin-bottom:36px; }
.dropzone{ width:100%; max-width:440px; border:1.5px dashed var(--maroon-bright); border-radius:8px; background:var(--bg-elevated); padding:48px 28px; cursor:pointer; transition:border-color .18s ease, background .18s ease; }
.dropzone:hover{ border-color:var(--gold); background:#1C1716; }
.dropzone .icon{ width:52px; height:52px; margin:0 auto 18px; border-radius:50%; border:1.4px solid var(--gold); display:flex; align-items:center; justify-content:center; }
.dropzone .icon svg{ width:22px; height:22px; stroke:var(--gold-bright); }
.dropzone .primary-text{ font-size:16.5px; font-weight:500; margin-bottom:6px; }
.dropzone .secondary-text{ font-size:13px; color:var(--muted); }
.or-row{ display:flex; align-items:center; gap:12px; color:var(--muted); font-size:13px; margin:22px 0; width:100%; max-width:440px; }
.or-row .line{ flex:1; height:1px; background:var(--line); }
.photo-btn{ display:inline-flex; align-items:center; gap:9px; background:none; border:1px solid var(--line); color:var(--ivory-dim); padding:12px 22px; border-radius:24px; font-family:inherit; font-size:14.5px; cursor:pointer; transition:border-color .15s ease, color .15s ease; }
.photo-btn:hover{ border-color:var(--gold); color:var(--gold-bright); }
.photo-btn svg{ width:16px; height:16px; }
.steps{ display:flex; gap:36px; margin-top:52px; }
.step{ display:flex; flex-direction:column; align-items:center; gap:10px; max-width:110px; }
.step-icon{ width:38px; height:38px; border-radius:50%; background:rgba(122,31,43,0.16); border:1px solid var(--maroon-bright); display:flex; align-items:center; justify-content:center; }
.step-icon svg{ width:16px; height:16px; stroke:var(--gold-bright); }
.step span{ font-size:12.5px; color:var(--muted); line-height:1.4; }
@media (max-width:520px){ h1.hero-h{ font-size:26px; } .steps{ gap:22px; } .step{ max-width:88px; } }

</style>
</head>
<body>

<header class="appbar">
  <div class="logo"><div class="seal"><div class="seal-mark"></div></div>Nyaya Saral</div>
  <div class="lang-switch"><button class="active">EN</button><button>हिं</button><button>తె</button></div>
</header>

<main class="home">
  <h1 class="hero-h">Upload your document.<br>We'll explain it simply.</h1>
  <p class="sub">FIR, notice, or chargesheet — in any language, any photo.</p>

  <a href="02-processing.html" class="dropzone" role="button" tabindex="0" style="display:block;">
    <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 9l5-5 5 5"/><path d="M5 21h14"/></svg></div>
    <div class="primary-text">Tap to upload</div>
    <div class="secondary-text">or drag a photo here</div>
  </a>

  <div class="or-row"><div class="line"></div> or <div class="line"></div></div>

  <button class="photo-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Take a photo instead
  </button>

  <div class="steps">
    <div class="step"><div class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 9l5-5 5 5"/><path d="M5 21h14"/></svg></div><span>Upload</span></div>
    <div class="step"><div class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></div><span>We check it</span></div>
    <div class="step"><div class="step-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg></div><span>You get clear answers</span></div>
  </div>
</main>

<footer class="appfoot">
  <a href="03-results.html">See a sample result</a>
  <div class="disclaimer">This gives information, not legal advice.</div>
</footer>

</body>
</html>
